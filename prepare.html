<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تجهيز الطلب - برجمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body {
            background: linear-gradient(135deg, #093257, #0ea5e9);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
        }
        .prepare-card {
            background: rgba(255,255,255,0.97);
            border-radius: 28px;
            padding: 28px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.28);
            animation: slideUp 0.4s ease;
            margin: 10px 0;
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(28px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .header { text-align:center; margin-bottom:22px; }
        .logo {
            width:68px; height:68px;
            background:linear-gradient(135deg,#093257,#0ea5e9);
            border-radius:20px; display:flex; align-items:center; justify-content:center;
            font-size:2rem; margin:0 auto 10px; color:white;
            box-shadow:0 10px 20px rgba(14,165,233,0.3);
        }
        h1 { color:#333; font-size:1.4rem; font-weight:800; margin-bottom:4px; }
        .order-id {
            color:#666; font-size:.85rem; background:#f5f5f5;
            padding:5px 12px; border-radius:20px; display:inline-block;
        }
        .login-section {
            margin:16px 0; padding:18px;
            background:linear-gradient(135deg,#f5f5f5,#e8e8e8);
            border-radius:18px;
        }
        .input-field {
            width:100%; padding:12px 14px; border:2px solid #ddd;
            border-radius:12px; font-size:1rem; margin-bottom:13px;
            font-family:'Cairo',sans-serif;
        }
        .input-field:focus { border-color:#0ea5e9; outline:none; }
        .btn {
            background:linear-gradient(135deg,#0ea5e9,#0284c7);
            color:white; border:none; padding:13px 20px; border-radius:14px;
            font-weight:700; font-size:1rem; cursor:pointer; width:100%;
            transition:all .2s; font-family:'Cairo',sans-serif; margin-bottom:8px;
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 18px rgba(14,165,233,.3); }
        .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
        .btn-success  { background:linear-gradient(135deg,#10b981,#059669); }
        .btn-warning  { background:linear-gradient(135deg,#f59e0b,#d97706); }
        .btn-danger   { background:linear-gradient(135deg,#ef4444,#dc2626); }
        .btn-outline  { background:white; color:#0284c7; border:2px solid #0ea5e9; }
        .product-item {
            background:white; border:2px solid #e8e8e8; border-radius:14px;
            padding:14px; margin-bottom:10px;
        }
        .product-name { font-weight:800; color:#093257; font-size:1.05rem; margin-bottom:4px; }
        .product-detail {
            display:flex; justify-content:space-between;
            color:#666; font-size:.85rem; margin-bottom:4px;
        }
        .volume-badge {
            background:#0ea5e920; color:#0284c7;
            padding:2px 8px; border-radius:12px; font-weight:700; font-size:.78rem;
        }
        .total-volume {
            background:linear-gradient(135deg,#09325715,#0ea5e915);
            border-radius:14px; padding:14px; margin:14px 0; text-align:center;
            border:1px solid rgba(14,165,233,.18);
        }
        .total-volume-value { font-size:1.7rem; font-weight:900; color:#093257; }
        .vehicle-selector { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin:12px 0; }
        .vehicle-option {
            border:2px solid #ddd; border-radius:14px; padding:13px 5px;
            text-align:center; cursor:pointer; transition:all .2s;
        }
        .vehicle-option.selected { border-color:#0ea5e9; background:#0ea5e910; }
        .vehicle-icon { font-size:1.8rem; margin-bottom:4px; }
        .vehicle-name { font-weight:700; color:#333; font-size:.9rem; }
        .vehicle-capacity { font-size:.68rem; color:#666; }
        .capacity-bar { height:9px; background:#e0e0e0; border-radius:10px; margin:10px 0; overflow:hidden; }
        .capacity-fill { height:100%; background:linear-gradient(90deg,#10b981,#0ea5e9); border-radius:10px; transition:width .3s; }
        .capacity-text { text-align:center; font-weight:700; color:#093257; font-size:.88rem; margin:8px 0; }
        .loader { text-align:center; padding:36px; }
        .loader span {
            display:inline-block; width:8px; height:8px; border-radius:50%;
            background:#0ea5e9; margin:0 3px;
            animation:bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce {
            0%,80%,100%{ transform:scale(0); }
            40%{ transform:scale(1); }
        }
        .msg-error   { color:#dc2626; text-align:center; padding:14px; font-weight:700; }
        .msg-success { color:#059669; text-align:center; padding:14px; font-weight:700; }
        .msg-warning {
            background:#fef3c7; border:2px solid #f59e0b;
            border-radius:12px; padding:11px; color:#b45309;
            text-align:center; margin:10px 0; font-weight:700;
        }
        .phase-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:linear-gradient(135deg,#0ea5e9,#0284c7);
            color:white; padding:5px 14px; border-radius:20px;
            font-weight:800; font-size:.82rem; margin-bottom:16px;
        }
        .phase-badge.phase-2 { background:linear-gradient(135deg,#f59e0b,#d97706); }
        .phase-badge.phase-done { background:linear-gradient(135deg,#10b981,#059669); }
        .driver-link-box {
            background:linear-gradient(135deg,#f0fdf4,#d1fae5);
            border:2px solid #10b981; border-radius:16px;
            padding:18px; margin-top:14px;
        }
        .driver-link-box h3 { color:#065f46; font-size:1rem; margin-bottom:10px; }
        .link-text {
            background:white; border:1px solid #a7f3d0; border-radius:10px;
            padding:10px 12px; font-size:.78rem; color:#064e3b;
            word-break:break-all; margin-bottom:10px; direction:ltr; text-align:left;
        }
        .copy-btn {
            background:linear-gradient(135deg,#10b981,#059669); color:white;
            border:none; padding:10px 18px; border-radius:10px;
            font-weight:700; font-size:.9rem; cursor:pointer;
            font-family:'Cairo',sans-serif; width:100%; margin-bottom:6px;
        }
        .section-title { font-weight:800; color:#093257; margin-bottom:10px; font-size:1rem; }
        hr { border:none; border-top:1px solid #e8e8e8; margin:16px 0; }
    </style>
</head>
<body>
    <div class="prepare-card" id="prepareCard">
        <div class="header">
            <div class="logo">📦</div>
            <h1>تجهيز الطلب</h1>
            <div class="order-id" id="orderId">...</div>
        </div>

        <div id="loginSection" class="login-section">
            <h2 style="margin-bottom:14px;color:#093257;">🔐 تسجيل دخول المجهز</h2>
            <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
            <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول</button>
            <div id="loginError" style="color:#dc2626;margin-top:8px;text-align:center;"></div>
        </div>

        <div id="orderSection" style="display:none;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBMLyYD0U5v3B3CWv80i-1mUGpBpkNKB98",
            authDomain: "burjuman-6cb83.firebaseapp.com",
            projectId: "burjuman-6cb83",
            storageBucket: "burjuman-6cb83.firebasestorage.app",
            messagingSenderId: "177984721378",
            appId: "1:177984721378:web:afb0a673eb1a4f1c1b69bb"
        };
        firebase.initializeApp(firebaseConfig);
        const db      = firebase.firestore();
        const storage = firebase.storage();

        const urlParams = new URLSearchParams(window.location.search);
        const orderId   = urlParams.get('order');
        document.getElementById('orderId').textContent = orderId || 'غير موجود';

        // Vehicle defaults (overridden by Firebase settings if available)
        let VEHICLES = {
            'scooter': { name:'ستوتة',   icon:'🛵', capacity:0.4,  maxWeight:20,  color:'#f59e0b' },
            'pickup':  { name:'بيك اب',  icon:'🚐', capacity:6,    maxWeight:500, color:'#0ea5e9' },
            'truck':   { name:'شاحنة',   icon:'🚛', capacity:30,   maxWeight:3000,color:'#8b5cf6' }
        };

        let selectedVehicle  = null;
        let orderData        = null;
        let totalVolume      = 0;
        let totalWeight      = 0;
        let currentUsername  = '';
        let currentUserName  = '';
        let preparerPhase    = 0; // 0=not started, 1=preparing, 2=done
        let timerInterval    = null;   // setInterval ref for prep stopwatch
        let prepStartTime    = null;   // Date object when preparation started
        let productDataMap   = {}; // keyed by product name → { carton_volume, carton_weight, carton_l, carton_w, carton_h }

        // ── Load delivery vehicles from Firebase settings ──
        async function loadDeliveryVehicles() {
            try {
                const snap = await db.collection('settings').where('key','==','delivery_vehicles').get();
                if (!snap.empty) {
                    const data = snap.docs[0].data();
                    if (data.value && typeof data.value === 'object') {
                        VEHICLES = data.value;
                    }
                }
            } catch(e) { /* use defaults */ }
        }

        // ── Load real product dimensions from Firestore products collection ──
        async function loadProductDimensions() {
            try {
                const snap = await db.collection('products').get();
                snap.docs.forEach(doc => {
                    const p = doc.data();
                    if (p.name) {
                        productDataMap[p.name] = {
                            carton_volume: parseFloat(p.carton_volume) || 0,
                            carton_weight: parseFloat(p.carton_weight) || 0,
                            carton_l: parseFloat(p.carton_l) || 0,
                            carton_w: parseFloat(p.carton_w) || 0,
                            carton_h: parseFloat(p.carton_h) || 0,
                        };
                    }
                });
            } catch(e) { console.warn('Could not load product dimensions', e); }
        }

        // ── Login ──
        window.login = async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl  = document.getElementById('loginError');
            if (!username || !password) { errorEl.textContent='⚠️ أدخل بيانات الدخول'; return; }
            errorEl.textContent='⏳ جاري التحقق...';
            try {
                const snap = await db.collection('users').where('username','==',username).get();
                if (snap.empty) { errorEl.textContent='❌ اسم المستخدم غير صحيح'; return; }
                const user = snap.docs[0].data();
                if ((user.password || '').trim() !== password) { errorEl.textContent='❌ كلمة المرور خاطئة'; return; }
                const allowedTypes = ['preparer', 'admin', 'supervisor', 'sales_manager'];
                if (!allowedTypes.includes(user.accountType)) { errorEl.textContent='❌ ليس لديك صلاحية الوصول لهذه الصفحة'; return; }
                currentUsername = username;
                currentUserName = user.name || username;
                // Save 12-hour session
                localStorage.setItem('preparer_session', JSON.stringify({
                    username, name: user.name || username, loginTime: Date.now()
                }));
                document.getElementById('loginSection').style.display='none';
                errorEl.textContent='';
                await Promise.all([loadDeliveryVehicles(), loadProductDimensions()]);
                await loadOrder();
            } catch(e) {
                console.error(e);
                errorEl.textContent='❌ حدث خطأ، حاول مجدداً';
            }
        };

        // ── Load Order ──
        async function loadOrder() {
            const sec = document.getElementById('orderSection');
            if (!orderId) {
                sec.innerHTML='<div class="msg-error">❌ رقم الطلب غير موجود</div>';
                sec.style.display='block'; return;
            }
            sec.innerHTML=`<div class="loader"><span></span><span></span><span></span><p style="margin-top:14px;color:#666;">جاري تحميل الطلب...</p></div>`;
            sec.style.display='block';
            try {
                const snap = await db.collection('orders').where('orderId','==',orderId).get();
                let orderDoc;
                if (!snap.empty) { orderDoc = snap.docs[0]; }
                else {
                    orderDoc = await db.collection('orders').doc(orderId).get();
                    if (!orderDoc.exists) { sec.innerHTML='<div class="msg-error">❌ الطلب غير موجود</div>'; return; }
                }
                orderData = { id:orderDoc.id, ...orderDoc.data() };

                // determine current phase
                if (orderData.status === 'Prepared' || orderData.status === 'In Delivery' ||
                    orderData.status === 'NearCustomer' || orderData.status === 'Delivered') {
                    preparerPhase = 2;
                } else if (orderData.status === 'Preparing') {
                    preparerPhase = 1;
                } else {
                    preparerPhase = 0;
                }

                displayOrderDetails();

                // real-time listener
                db.collection('orders').doc(orderData.id).onSnapshot(snap => {
                    if (!snap.exists) return;
                    const d = snap.data();
                    // sync phase badge if someone else changes it
                    const badge = document.getElementById('phaseBadge');
                    if (badge && d.status === 'Preparing' && preparerPhase < 1) {
                        preparerPhase = 1; displayOrderDetails();
                    }
                });
            } catch(e) {
                console.error(e);
                sec.innerHTML='<div class="msg-error">❌ حدث خطأ في التحميل</div>';
            }
        }

        // ── Display order details ──
        function displayOrderDetails() {
            const sec = document.getElementById('orderSection');

            // parse products
            const productsList = orderData.products || '';
            const items = [];
            totalVolume = 0; totalWeight = 0;
            let missingDimensions = [];
            const matches = productsList.match(/([^،,\n()]+)\((\d+)\)/g) || [];
            matches.forEach(m => {
                const mm = m.match(/(.+)\((\d+)\)/);
                if (mm) {
                    const name = mm[1].trim();
                    const qty  = parseInt(mm[2]) || 1;
                    // Use real dimensions from Firestore products collection
                    const prodData = productDataMap[name];
                    const vol = prodData?.carton_volume || 0;
                    const wgt = prodData?.carton_weight || 0;
                    const hasDimensions = vol > 0 || wgt > 0;
                    if (!hasDimensions) missingDimensions.push(name);
                    totalVolume += vol * qty;
                    totalWeight += wgt * qty;
                    const dims = (prodData?.carton_l && prodData?.carton_w && prodData?.carton_h)
                        ? `${prodData.carton_l}×${prodData.carton_w}×${prodData.carton_h} سم`
                        : null;
                    items.push({ name, qty, vol, wgt, totalVol: vol*qty, totalWgt: wgt*qty, dims, hasDimensions });
                }
            });

            // warning for products without dimensions
            const missingWarning = missingDimensions.length > 0 ? `
                <div class="msg-warning" style="text-align:right;">
                    ⚠️ المنتجات التالية ليس لها أبعاد مُدخلة في قاعدة البيانات، يرجى إضافتها من لوحة الأدمن:<br>
                    <strong>${missingDimensions.join(' — ')}</strong>
                </div>` : '';

            // products HTML
            const productsHtml = items.map(item=>`
                <div class="product-item" style="${!item.hasDimensions ? 'border-color:#f59e0b;background:#fffbeb;' : ''}">
                    <div class="product-name">${item.name}${!item.hasDimensions ? ' <span style="color:#d97706;font-size:.78rem;">⚠️ بدون أبعاد</span>' : ''}</div>
                    <div class="product-detail">
                        <span>الكمية: <strong>${item.qty}</strong></span>
                        ${item.hasDimensions
                            ? `<span class="volume-badge">📐 ${item.totalVol.toFixed(4)} م³</span>
                               <span class="volume-badge" style="background:#10b98120;color:#059669;">⚖️ ${item.totalWgt.toFixed(2)} كغ</span>`
                            : `<span style="color:#d97706;font-size:.78rem;">الأبعاد غير محددة</span>`
                        }
                    </div>
                    ${item.dims ? `<div style="font-size:.72rem;color:#888;margin-top:3px;">📦 ${item.dims}</div>` : ''}
                </div>`).join('');

            // vehicles HTML — lock after preparation starts
            const vehicleLocked = preparerPhase >= 1;
            const vehiclesHtml = Object.entries(VEHICLES).map(([key,v])=>`
                <div class="vehicle-option" id="vehicle-${key}"
                    ${vehicleLocked ? '' : `onclick="selectVehicle('${key}')"`}
                    style="${vehicleLocked ? 'pointer-events:none;opacity:0.6;cursor:default;' : ''}">
                    <div class="vehicle-icon">${v.icon}</div>
                    <div class="vehicle-name">${v.name}</div>
                    <div class="vehicle-capacity">📐 ${v.capacity} م³</div>
                    <div class="vehicle-capacity">⚖️ ${v.maxWeight||'—'} كغ</div>
                </div>`).join('');

            // phase badge
            const phaseBadgeHtml = preparerPhase === 0
                ? `<div id="phaseBadge" class="phase-badge">🔵 بانتظار البدء</div>`
                : preparerPhase === 1
                    ? `<div id="phaseBadge" class="phase-badge phase-2">🟡 جاري التجهيز</div>`
                    : `<div id="phaseBadge" class="phase-badge phase-done">✅ تم التجهيز</div>`;

            // driver link box (shown when done)
            const driverLink = `https://brjman.com/driver.html?order=${orderId}`;
            const driverLinkHtml = preparerPhase >= 2 ? `
                <div class="driver-link-box">
                    <h3>🚗 رابط السائق جاهز</h3>
                    <div class="link-text" id="driverLinkText">${driverLink}</div>
                    <button class="copy-btn" onclick="copyDriverLink()">📋 نسخ الرابط</button>
                    <a href="${driverLink}" target="_blank" style="display:block;text-align:center;color:#065f46;font-weight:700;font-size:.88rem;margin-top:4px;">🔗 فتح لوحة السائق</a>
                </div>` : '';

            // single toggle button + live stopwatch
            const timerBlockHtml = preparerPhase === 1 ? `
                <div id="timerDisplay" style="text-align:center;font-size:1.6rem;font-weight:900;color:#093257;margin:10px 0;background:#f0f9ff;border-radius:12px;padding:12px 0;border:2px solid #bae6fd;">
                    ⏱️ <span id="timerValue">00:00</span>
                </div>` : '';
            const mainBtnHtml = preparerPhase === 0
                ? `<button class="btn btn-warning" id="mainPrepBtn" onclick="startPreparing()" style="margin-bottom:10px">🚀 بدء تجهيز القائمة</button>`
                : preparerPhase === 1
                    ? `<button class="btn btn-success" id="mainPrepBtn" onclick="finishPreparing()" style="margin-bottom:10px">✅ تم التجهيز</button>`
                    : `<button class="btn btn-success" id="mainPrepBtn" disabled style="opacity:.45;margin-bottom:10px">✅ تم التجهيز</button>`;

            sec.innerHTML = `
                <div style="margin-bottom:18px">
                    ${phaseBadgeHtml}
                    <div class="section-title">🏪 معلومات الطلب</div>
                    <div style="background:#f8f8f8;border-radius:12px;padding:12px;font-size:.9rem">
                        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                            <span>المحل:</span><span style="font-weight:700">${orderData.shopName||'—'}</span>
                        </div>
                        <div style="display:flex;justify-content:space-between">
                            <span>العنوان:</span><span style="font-weight:700">${orderData.shopAddress||'—'}</span>
                        </div>
                    </div>
                </div>

                <div class="section-title">📋 المنتجات</div>
                ${missingWarning}
                ${productsHtml || '<p style="color:#999;text-align:center;padding:10px">لا توجد منتجات مفصّلة</p>'}

                <div class="total-volume">
                    <div style="font-size:.82rem;color:#666;margin-bottom:4px">إجمالي الطلب</div>
                    <div class="total-volume-value">${totalVolume > 0 ? totalVolume.toFixed(4) + ' م³' : '—'}</div>
                    <div style="font-size:.82rem;color:#666;margin-top:4px">⚖️ ${totalWeight > 0 ? totalWeight.toFixed(2) + ' كغ' : '—'}</div>
                    ${missingDimensions.length > 0 ? `<div style="font-size:.75rem;color:#d97706;margin-top:6px;">⚠️ حجم/وزن غير دقيق — ${missingDimensions.length} منتج بدون أبعاد</div>` : ''}
                </div>

                <hr>
                <div class="section-title">🚚 اختر المركبة</div>
                <div class="vehicle-selector">${vehiclesHtml}</div>
                <div id="capacityInfo" style="display:none">
                    <div class="capacity-bar"><div class="capacity-fill" id="capacityFill" style="width:0%"></div></div>
                    <div class="capacity-text" id="capacityText"></div>
                </div>

                <hr>
                ${timerBlockHtml}
                ${mainBtnHtml}

                <div id="prepareMessage" style="margin-top:12px">${driverLinkHtml}</div>
            `;

            // restore vehicle selection if already set
            if (orderData.vehicle_type) {
                const vKey = Object.keys(VEHICLES).find(k=>VEHICLES[k].name===orderData.vehicle_type);
                if (vKey) selectVehicle(vKey);
            }

            // start or continue stopwatch when in phase 1
            if (preparerPhase === 1) {
                if (!prepStartTime) {
                    prepStartTime = orderData.preparing_at ? new Date(orderData.preparing_at) : new Date();
                }
                startTimer();
            }
        }

        // ── Select vehicle ──
        window.selectVehicle = function(vehicleKey) {
            selectedVehicle = vehicleKey;
            Object.keys(VEHICLES).forEach(k=>{
                const el=document.getElementById(`vehicle-${k}`);
                if(el) el.classList.toggle('selected', k===vehicleKey);
            });
            const v=VEHICLES[vehicleKey];
            const volPct = Math.min(100,(totalVolume/v.capacity)*100);
            const wgtPct = v.maxWeight ? Math.min(100,(totalWeight/v.maxWeight)*100) : 0;
            document.getElementById('capacityInfo').style.display='block';
            document.getElementById('capacityFill').style.width=`${volPct}%`;
            let status='';
            if (totalVolume > v.capacity) {
                status=`⚠️ الطلب أكبر من سعة ${v.name} ب ${(totalVolume-v.capacity).toFixed(3)} م³`;
                document.getElementById('capacityFill').style.background='linear-gradient(90deg,#ef4444,#dc2626)';
            } else {
                status=`${v.name}: حجم ${volPct.toFixed(0)}% من السعة`;
                if(v.maxWeight) status += ` | وزن ${wgtPct.toFixed(0)}% من الحمولة`;
                document.getElementById('capacityFill').style.background='linear-gradient(90deg,#10b981,#0ea5e9)';
            }
            document.getElementById('capacityText').textContent=status;
        };

        // ── Phase 1: Start Preparing ──
        window.startPreparing = async function() {
            const btn = document.getElementById('mainPrepBtn');
            btn.disabled=true; btn.textContent='⏳ جاري...';
            try {
                const now = new Date();
                await db.collection('orders').doc(orderData.id).update({
                    status: 'Preparing',
                    preparing_by: currentUsername,
                    preparing_by_name: currentUserName,
                    preparing_at: now.toISOString()
                });
                orderData.status = 'Preparing';
                orderData.preparing_at = now.toISOString();
                prepStartTime = now;
                preparerPhase = 1;
                displayOrderDetails(); // will start timer via post-render hook
                showToast('✅ تم بدء التجهيز');
            } catch(e) {
                console.error(e);
                btn.disabled=false; btn.textContent='🚀 بدء تجهيز القائمة';
                showToast('❌ حدث خطأ',false);
            }
        };

        // ── Phase 2: Finish Preparing ──
        window.finishPreparing = async function() {
            if (!selectedVehicle) { showToast('⚠️ اختر المركبة أولاً',false); return; }
            const btn = document.getElementById('mainPrepBtn');
            btn.disabled=true; btn.textContent='⏳ جاري التأكيد...';
            try {
                const driverLink = `https://brjman.com/driver.html?order=${orderId}`;
                const prepDurationSec = prepStartTime ? Math.floor((Date.now() - prepStartTime.getTime()) / 1000) : null;
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                await db.collection('orders').doc(orderData.id).update({
                    status: 'Prepared',
                    prepared_by: currentUsername,
                    prepared_by_name: currentUserName,
                    prepared_at: new Date().toISOString(),
                    vehicle_type: VEHICLES[selectedVehicle].name,
                    driver_link: driverLink,
                    total_volume: parseFloat(totalVolume.toFixed(4)),
                    total_weight: parseFloat(totalWeight.toFixed(3)),
                    ...(prepDurationSec !== null ? { prep_duration_sec: prepDurationSec } : {})
                });
                orderData.status = 'Prepared';
                orderData.vehicle_type = VEHICLES[selectedVehicle].name;
                preparerPhase = 2;

                // Telegram notification
                const TG_TOKEN = '8142978736:AAEpT6L_RNNIUMx54mU83gx4ap_Z3VmuXsA';
                const TG_CHAT  = '-5246620507';
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        chat_id:TG_CHAT,
                        text:`🚗 طلب جاهز للتوصيل\n🏪 ${orderData.shopName}\n🆔 ${orderId}\n🚚 ${VEHICLES[selectedVehicle].name}\n📐 ${totalVolume.toFixed(3)} م³\n⚖️ ${totalWeight.toFixed(2)} كغ\n\n🔗 ${driverLink}`
                    })
                }).catch(()=>{});

                displayOrderDetails();
                showToast('✅ تم التجهيز! الرابط جاهز للسائق');
            } catch(e) {
                console.error(e);
                btn.disabled=false; btn.textContent='✅ تم التجهيز';
                showToast('❌ حدث خطأ',false);
            }
        };

        // ── Copy driver link ──
        window.copyDriverLink = function() {
            const link = document.getElementById('driverLinkText')?.textContent;
            if (!link) return;
            navigator.clipboard.writeText(link).then(()=>showToast('✅ تم نسخ الرابط')).catch(()=>{
                // fallback
                const ta=document.createElement('textarea');
                ta.value=link; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ تم نسخ الرابط');
            });
        };

        // ── Prep stopwatch ──
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const el = document.getElementById('timerValue');
                if (!el) { clearInterval(timerInterval); timerInterval = null; return; }
                const elapsed = Math.floor((Date.now() - prepStartTime.getTime()) / 1000);
                const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const s = (elapsed % 60).toString().padStart(2, '0');
                el.textContent = `${m}:${s}`;
            }, 1000);
        }

        // ── Toast ──
        function showToast(msg, ok=true) {
            const t=document.createElement('div');
            t.textContent=msg;
            t.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${ok?'#10b981':'#ef4444'};color:white;padding:12px 24px;border-radius:50px;font-weight:700;z-index:9999;box-shadow:0 5px 15px rgba(0,0,0,.2);font-family:'Cairo',sans-serif;`;
            document.body.appendChild(t);
            setTimeout(()=>t.remove(),2800);
        }

        // ── Auto-restore 12-hour session ──
        (function() {
            const SESSION_12H = 12 * 60 * 60 * 1000;
            try {
                const raw = localStorage.getItem('preparer_session');
                if (!raw) return;
                const s = JSON.parse(raw);
                if (!s.username || !s.loginTime || (Date.now() - s.loginTime) > SESSION_12H) {
                    localStorage.removeItem('preparer_session'); return;
                }
                currentUsername = s.username;
                currentUserName = s.name || s.username;
                document.getElementById('loginSection').style.display = 'none';
                Promise.all([loadDeliveryVehicles(), loadProductDimensions()]).then(() => loadOrder());
            } catch(e) { localStorage.removeItem('preparer_session'); }
        })();

        // ── No orderId ──
        if (!orderId) {
            document.getElementById('loginSection').style.display='none';
            document.getElementById('orderSection').style.display='block';
            document.getElementById('orderSection').innerHTML='<div class="msg-error">❌ رابط غير صحيح</div>';
        }
    </script>
</body>
</html>

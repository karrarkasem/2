<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة — برجمان</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#f0fdf9 0%,#e6f7f5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .wrap{max-width:440px;width:100%}
  .big-num{font-size:7rem;font-weight:900;color:transparent;background:linear-gradient(135deg,#0d9488,#0f766e);-webkit-background-clip:text;background-clip:text;line-height:1;margin-bottom:8px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .icon{font-size:3.5rem;margin-bottom:12px;animation:bounce 2s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1{font-size:1.4rem;font-weight:900;color:#093257;margin-bottom:10px}
  p{font-size:.9rem;color:rgba(9,50,87,.55);line-height:1.8;margin-bottom:28px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:14px;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;text-decoration:none;border:none;transition:.2s}
  .btn-primary{background:linear-gradient(135deg,#0d9488,#0f766e);color:white;box-shadow:0 8px 24px rgba(13,148,136,.35)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(13,148,136,.45)}
  .btn-ghost{background:rgba(9,50,87,.07);color:#093257;border:1.5px solid rgba(9,50,87,.12)}
  .btn-ghost:hover{background:rgba(9,50,87,.12)}
  .card{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.9);border-radius:24px;padding:40px 32px;box-shadow:0 16px 48px rgba(9,50,87,.1)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">🗺️</div>
    <div class="big-num">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>يبدو أن هذه الصفحة لم تعد موجودة أو تم نقلها<br>لا تقلق — يمكنك العودة للمتجر</p>
    <div class="btns">
      <a href="/index.html" class="btn btn-primary">🏠 العودة للمتجر</a>
      <a href="javascript:history.back()" class="btn btn-ghost">← الصفحة السابقة</a>
    </div>
  </div>
</div>
</body>
</html>
